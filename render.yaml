# Render Deployment Configuration for mjr-detail

services:
  # Backend API service
  - type: web
    name: mjr-detail-api
    env: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: |
      cd backend && \
      npm ci && \
      npx prisma generate && \
      npx tsc && \
      npx prisma migrate deploy && \
      npm prune --production
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: mjr-detail-db
          property: connectionString
      - key: TEXTBEE_DEVICE_ID
        sync: false
      - key: TEXTBEE_API_KEY
        sync: false

databases:
  # Managed PostgreSQL database
  - name: mjr-detail-db
    databaseName: mjr_detail
    plan: starter
